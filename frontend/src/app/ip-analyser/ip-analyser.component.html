<section>
    <h1>IP Analyser</h1>
    <br />
    <div class="header">
        <div class="action-buttons">
            <manage-resources [sponsoredMenu]="false"></manage-resources>
            <apikeys-dropdown [apiKeyType]="'IP_ANALYSER'"></apikeys-dropdown>
        </div>
    </div>
    <div class="analyses">
        @if (loading) {
        <loading-indicator class="resource-page-message"></loading-indicator>
        } @else if (ipv4Analysis && ipv6Analysis) {
        <div class="subtitle">
            <h1>IPv4</h1>
            <button mat-flat-button color="primary" (click)="(false)" [cdkCopyToClipboard]="ipv4Analysis" [matTooltip]="'Copy'">
                <i class="fa-light fa-copy"></i>
            </button>
        </div>
        <pre class="log">{{ ipv4Analysis }}</pre>
        <div class="subtitle">
            <h1>IPv6</h1>
            <button mat-flat-button color="primary" (click)="(false)" [cdkCopyToClipboard]="ipv6Analysis" [matTooltip]="'Copy'">
                <i class="fa-light fa-copy"></i>
            </button>
        </div>
        <pre class="log">{{ ipv6Analysis }}</pre>
        } @else {
        <refresh reason="There was problem loading IP Analyses, please try again" (refreshClbk)="getIpAnalysis()"></refresh>
        }
    </div>
</section>
