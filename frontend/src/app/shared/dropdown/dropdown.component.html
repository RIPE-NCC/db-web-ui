<div class="dropdown-container">
    <label class="dropdown-label">
        {{ label }}
    </label>

    <button #trigger="cdkOverlayOrigin" cdkOverlayOrigin type="button" class="dropdown-trigger" (click)="toggle()">
        <span>{{ selectedLabel }}</span>

        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24">
            <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
        </svg>
    </button>

    <ng-template
        cdkConnectedOverlay
        [cdkConnectedOverlayOrigin]="trigger"
        [cdkConnectedOverlayOpen]="isOpen"
        [cdkConnectedOverlayHasBackdrop]="true"
        [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
        (backdropClick)="close()"
    >
        <div class="dropdown-menu">
            @for (option of options; track option.value) {
            <button
                type="button"
                class="dropdown-item"
                [class.selected]="option.value === selectedValue"
                (click)="select(option)"
                [attr.data-cy]="'dropdown-item-' + option.label"
            >
                {{ option.label }}
            </button>
            }
        </div>
    </ng-template>
</div>
